name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff needs the full history and all tags to build the changelog.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      # Build the release notes from conventional commits of the latest tag
      # (git-cliff) + installer instructions. Saved to a file AND exposed as an
      # output: the file feeds `gh release edit` (release body) after the build,
      # the output feeds tauri-action's releaseBody (which populates latest.json).
      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          {
            npx git-cliff --latest --strip header
            echo
            echo '---'
            echo
            echo 'Установщик для Windows:'
            echo '- `.exe` — NSIS installer (рекомендуется)'
            echo '- `.msi` — MSI installer'
          } > RELEASE_NOTES.md
          {
            echo 'BODY<<CLIFF_EOF'
            cat RELEASE_NOTES.md
            echo 'CLIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Usage Tracker ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.BODY }}
          releaseDraft: false
          prerelease: false
          # Generate and upload latest.json so the in-app updater can find releases.
          includeUpdaterJson: true

      # tauri-action's releaseBody populates latest.json (the in-app update
      # banner) but does NOT overwrite the body of an already-published release.
      # The `published` trigger means the release always pre-exists, so set its
      # body explicitly — this is what the release page and the in-app "What's
      # new" (GitHub Releases API) display.
      - name: Apply changelog to release body
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --notes-file RELEASE_NOTES.md
